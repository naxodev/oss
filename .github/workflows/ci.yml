name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

concurrency:
# Group concurrency on workflow, then:
# - Is merge run? Group on branch name (`refs/heads/main`)
# - Is pull request? Group on pull request branch name, for example `feat/add-awesome-feature`
  group: >-
    ${{ github.workflow }}-${{
      github.event_name == 'push'
        && github.ref
        || github.head_ref
    }}
  # Run merge workflows in sequence to prevent parallel deployments and releases
  # Cancel stale pull request runs in progress for the same branch
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  NODE_OPTIONS: --max-old-space-size=6144


jobs:
  main:
    runs-on: ubuntu-latest
    # Backstop so a hung task (e.g. an e2e install blocked on a torn-down local
    # registry) fails fast instead of burning the 6h GitHub default.
    timeout-minutes: 40
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      # pnpm is NOT used to install this repo. It remains available only
      # because the e2e harness shells out to `pnpm` to scaffold its
      # throwaway test workspace (migrated to bun in Phase 3).
      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Restore the dependency cache that `cache: 'pnpm'` previously provided.
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      # Connect your workspace on nx.app and uncomment this to enable task distribution.
      # The "--stop-agents-after" is optional, but allows idle agents to shut down once the "build" targets have been requested
      # - run: bunx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"


      - uses: nrwl/nx-set-shas@v4

      - run: bunx nx-cloud record -- nx format:check
      - run: bunx nx affected -t lint test

      - run: bunx nx affected -t build --yes

      # Run e2e serially: the suites share one local Verdaccio registry, so
      # running them in parallel races on registry ownership/teardown and can
      # hang the run. Build deps are already built by the step above.
      - if: ${{ matrix.os != 'windows-latest'}}
        run: bunx nx affected -t e2e --parallel=1
